<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="img" href="./images/logo1.png">
  <meta name="description" content="Genkit AI Assistant — Ask anything about Genkit's web and AI development services.">
  <title>Genkit | AI Assistant</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Floating Toggle Button -->
  <button class="chat-toggle" id="chatToggle" onclick="toggleChat()" aria-label="Open Genkit AI Chat">
    <span class="material-symbols-rounded toggle-icon" id="toggleIcon">chat</span>
  </button>

  <!-- Chat Widget -->
  <div class="chat-container" id="chatBox" role="dialog" aria-label="Genkit AI Chat">

    <!-- Header -->
    <div class="chat-header">
      <div class="header-info">
        <div class="header-text">
          <span class="header-title">Genkit Assistant</span>
        </div>
        <div class="bot-logo-header">
          <img src="./images/logo1.png" alt="Genkit Logo">
        </div>
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="messages" role="log" aria-live="polite"></div>

    <!-- Input -->
    <div class="chat-input-container">
      <div class="chat-input-wrapper" id="inputWrapper">
        <textarea
          id="input"
          placeholder="Ask Genkit anything..."
          autocomplete="off"
          rows="1"
          aria-label="Chat message input"
        ></textarea>
        <button onclick="sendMessage()" id="sendBtn" class="send-btn" aria-label="Send message">
          <span class="material-symbols-rounded">send</span>
        </button>
      </div>
      <div class="footer-text">Genkit AI · Responses may not always be accurate</div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
